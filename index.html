<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#e9ecef;
}

/* SIDEBAR */
.sidebar{
    background:#8B1E1E;
    min-height:100vh;
    padding:15px;
}

.sidebar button{
    width:100%;
    margin-bottom:12px;
    border:none;
    padding:12px;
    border-radius:10px;
    background:#f8f9fa;
    text-align:left;
    font-weight:500;
}

.sidebar button i{
    margin-right:10px;
}

/* HEADER */
.topbar{
    background:#d32f2f;
    color:white;
    padding:10px 20px;
}

/* CARD */
.box{
    background:#f8f9fa;
    border-radius:15px;
    padding:20px;
    border:1px solid #ddd;
}

/* DOTS */
.dot{
    width:28px;
    height:28px;
    border-radius:50%;
    background:#ddd;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:4px;
    font-size:12px;
}

.dot.active{
    background:#8B1E1E;
    color:white;
}

</style>
</head>

<body>

<div class="container-fluid">

<!-- HEADER -->
<div class="topbar d-flex justify-content-between align-items-center">

<b>DASHBOARD</b>

<div class="d-flex gap-2">
<input class="form-control form-control-sm" placeholder="Search">
<button class="btn btn-light btn-sm"><i class="bi bi-person"></i></button>
</div>

</div>

<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 d-none d-md-block sidebar">

<button><i class="bi bi-house"></i> Home</button>
<button><i class="bi bi-bell"></i> Alarmi</button>
<button><i class="bi bi-capsule"></i> Terapija</button>
<button><i class="bi bi-calendar"></i> Kalendar</button>
<button><i class="bi bi-person"></i> Profil</button>

</div>

<!-- MAIN -->
<div class="col-12 col-md-10 p-4">

<!-- TOP ROW -->
<div class="row g-3 mb-3">

<div class="col-md-4 col-12">
<div class="box text-center">
<p>Sledeći obrok</p>
<h4 id="time"></h4>
</div>
</div>

<div class="col-md-4 col-12">
<div class="box text-center">
<p>Kalendar</p>
<div class="d-flex flex-wrap justify-content-center" id="mini-cal"></div>
</div>
</div>

<div class="col-md-4 col-12">
<div class="box">
<p>Dodaj alarm</p>
<input class="form-control mb-2" placeholder="Naziv">
<input type="time" class="form-control mb-2">
<textarea class="form-control mb-2" placeholder="Napomena"></textarea>
<button class="btn btn-danger w-100">Sačuvaj</button>
</div>
</div>

</div>

<!-- BOTTOM ROW -->
<div class="row g-3">

<div class="col-md-6 col-12">
<div class="box">
<p>Dnevni alarmi</p>
<hr>
</div>
</div>

<div class="col-md-6 col-12">
<div class="box">
<p>Statistika</p>
<canvas id="chart"></canvas>
</div>
</div>

</div>

</div>
</div>
</div>

<script>

// CLOCK
setInterval(()=>{
document.getElementById('time').innerText =
new Date().toLocaleTimeString();
},1000);

// MINI CALENDAR
const cal=document.getElementById('mini-cal');
for(let i=1;i<=14;i++){
const d=document.createElement('div');
d.className='dot'+([3,6,9,12].includes(i)?' active':'');
d.innerText=i;
cal.appendChild(d);
}

// CHART
new Chart(document.getElementById('chart'),{
type:'bar',
data:{
labels:['Alarmi','Terapije'],
datasets:[{
data:[1,0],
backgroundColor:'#8B1E1E'
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true}}
}
});

</script>

</body>
</html>
