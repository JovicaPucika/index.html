<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Inter',sans-serif;
    background:#F3F4F6;
}

/* SIDEBAR */
.sidebar{
    background:#8B1E1E;
    min-height:100vh;
    padding:20px 12px;
}

.sidebar-btn{
    width:100%;
    background:#F7F7F7;
    border:none;
    padding:12px 14px;
    border-radius:12px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:500;
}

.sidebar-btn.active{
    background:#E5E5E5;
}

/* HEADER */
.topbar{
    background:#D32F2F;
    padding:12px 20px;
    color:white;
    font-weight:600;
}

/* SEARCH */
.search{
    height:32px;
    border-radius:8px;
    border:none;
    padding:0 10px;
}

/* CARD */
.box{
    background:#F7F7F7;
    border-radius:16px;
    padding:18px;
    border:1px solid #E0E0E0;
}

/* TITLE */
.title{
    font-size:14px;
    color:#555;
    margin-bottom:10px;
}

/* TIME */
.time{
    font-size:26px;
    font-weight:600;
}

/* DOT CALENDAR */
.dot{
    width:34px;
    height:34px;
    border-radius:50%;
    background:#E0E0E0;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:4px;
    font-size:12px;
}

.dot.active{
    background:#8B1E1E;
    color:white;
}

/* FORM */
.form-control{
    border-radius:10px;
}

/* BUTTON */
.btn-danger{
    background:#D32F2F;
    border:none;
    border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{display:none;}
}

</style>
</head>

<body>

<div class="container-fluid">

<!-- HEADER -->
<div class="topbar d-flex justify-content-between align-items-center">

<span>DASHBOARD</span>

<div class="d-flex align-items-center gap-2">
<input class="search" placeholder="Search">
<button class="btn btn-light btn-sm"><i class="bi bi-person"></i></button>
</div>

</div>

<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar">

<button class="sidebar-btn active"><i class="bi bi-house"></i> Home</button>
<button class="sidebar-btn"><i class="bi bi-bell"></i> Alarmi</button>
<button class="sidebar-btn"><i class="bi bi-capsule"></i> Terapija</button>
<button class="sidebar-btn"><i class="bi bi-calendar"></i> Kalendar</button>
<button class="sidebar-btn"><i class="bi bi-person"></i> Profil</button>

</div>

<!-- MAIN -->
<div class="col-md-10 col-12 p-4">

<!-- TOP ROW -->
<div class="row g-4 mb-3">

<div class="col-md-4 col-12">
<div class="box text-center">
<div class="title">Sledeći obrok</div>
<div class="time" id="time"></div>
</div>
</div>

<div class="col-md-4 col-12">
<div class="box text-center">
<div class="title">Kalendar</div>
<div class="d-flex flex-wrap justify-content-center" id="calendar"></div>
</div>
</div>

<div class="col-md-4 col-12">
<div class="box">
<div class="title">Dodaj alarm</div>

<input class="form-control mb-2" placeholder="Naziv">
<input type="time" class="form-control mb-2">
<textarea class="form-control mb-2" placeholder="Napomena"></textarea>

<button class="btn btn-danger w-100">Sačuvaj</button>

</div>
</div>

</div>

<!-- BOTTOM ROW -->
<div class="row g-4">

<div class="col-md-6 col-12">
<div class="box">
<div class="title">Dnevni alarmi</div>
<hr style="opacity:0.2">
</div>
</div>

<div class="col-md-6 col-12">
<div class="box">
<div class="title">Statistika</div>
<canvas id="chart" height="120"></canvas>
</div>
</div>

</div>

</div>
</div>
</div>

<script>

// CLOCK
setInterval(()=>{
document.getElementById('time').innerText =
new Date().toLocaleTimeString();
},1000);

// CALENDAR (TAČAN RASPORED KAO FIGMA)
const cal=document.getElementById('calendar');
for(let i=1;i<=14;i++){
const d=document.createElement('div');
d.className='dot'+([3,6,9,12].includes(i)?' active':'');
d.innerText=i;
cal.appendChild(d);
}

// CHART (minimal style kao figma)
new Chart(document.getElementById('chart'),{
type:'bar',
data:{
labels:['Alarmi','Terapije'],
datasets:[{
data:[0,0],
backgroundColor:'#8B1E1E',
borderRadius:6
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
y:{
beginAtZero:true,
grid:{color:'#eee'}
},
x:{
grid:{display:false}
}
}
}
});

</script>

</body>
</html>
