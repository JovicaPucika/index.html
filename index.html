<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background:#f4f4f4;
  font-family: 'Segoe UI';
}

/* SIDEBAR */
.sidebar {
  background:#8B1E1E;
  min-height:100vh;
  padding:15px;
}

.sidebar a {
  display:block;
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  text-decoration:none;
  color:black;
  font-weight:500;
}

.sidebar a.active {
  background:#e5e5e5;
}

/* HEADER */
.navbar {
  background:#C62828 !important;
}

/* CARD */
.card {
  border:none;
  border-radius:12px;
}

/* BUTTON */
.btn-danger {
  background:#8B1E1E;
  border:none;
}

/* CALENDAR */
.calendar-day {
  width:35px;
  height:35px;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:3px;
  cursor:pointer;
}

.calendar-day.active {
  background:#8B1E1E;
  color:white;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar {
    position:fixed;
    left:-100%;
    width:200px;
    z-index:1000;
    transition:0.3s;
  }

  .sidebar.show {
    left:0;
  }
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar" id="sidebar">
<a class="active" onclick="showPage(1)">Home</a>
<a onclick="showPage(2)">Alarmi</a>
<a onclick="showPage(3)">Terapija</a>
<a onclick="showPage(4)">Kalendar</a>
<a onclick="showPage(5)">Profil</a>
</div>

<!-- MAIN -->
<div class="col-md-10">

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-3 mb-3">
<button class="btn btn-light d-md-none" onclick="toggleSidebar()">☰</button>

<span class="text-white fw-bold">Pro Dashboard v3</span>

<div class="ms-auto d-flex gap-2">
<input class="form-control form-control-sm" placeholder="Search">
<button class="btn btn-light btn-sm">Profil</button>
<button class="btn btn-dark btn-sm">Register</button>
</div>
</nav>

<!-- HOME -->
<div id="page1">

<div class="row g-3">

<div class="col-md-4">
<div class="card p-3 text-center shadow-sm">
<h6>Trenutno vreme</h6>
<h3 id="clock"></h3>
<small id="date"></small>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 shadow-sm text-center">
<h6>Kalendar aktivnosti</h6>
<div class="d-flex flex-wrap justify-content-center" id="mini-cal"></div>
<small>crveno = aktivno</small>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 shadow-sm">
<h6>Dodaj Alarm</h6>

<input class="form-control mb-2" id="name" placeholder="Naziv">
<input type="time" class="form-control mb-2" id="time">

<select class="form-control mb-2" id="active">
<option value="true">Aktivan</option>
<option value="false">Neaktivan</option>
</select>

<textarea class="form-control mb-2" placeholder="Napomena"></textarea>

<button class="btn btn-danger w-100" onclick="addAlarm()">Sačuvaj</button>
</div>
</div>

</div>

<div class="row mt-3 g-3">

<div class="col-md-6">
<div class="card p-3 shadow-sm">
<h6>Dnevni alarmi</h6>
<div id="alarms"></div>
</div>
</div>

<div class="col-md-6">
<div class="card p-3 shadow-sm">
<h6>Statistika aktivnosti</h6>
<div style="height:150px;background:#eee;border-radius:10px;"></div>
</div>
</div>

</div>

</div>

<!-- ALARMI -->
<div id="page2" style="display:none;">
<div class="card p-3 shadow-sm">
<h6>Lista alarma</h6>
<div id="alarms2"></div>
</div>
</div>

<!-- TERAPIJA -->
<div id="page3" style="display:none;">
<div class="card p-3 shadow-sm">
<h6>Plan terapije</h6>
<div id="therapy"></div>
<button class="btn btn-danger mt-2" onclick="addTherapy()">+ Dodaj terapiju</button>
</div>
</div>

<!-- KALENDAR -->
<div id="page4" style="display:none;">
<div class="card p-3 shadow-sm">
<h6>Mesečni kalendar</h6>
<div class="d-grid" style="grid-template-columns:repeat(7,1fr)" id="month"></div>
</div>
</div>

<!-- PROFIL -->
<div id="page5" style="display:none;">
<div class="card p-3 shadow-sm" style="max-width:400px;">
<h6>Profil korisnika</h6>
<div class="text-center">
<div style="width:80px;height:80px;background:#ccc;border-radius:50%;margin:auto"></div>
<p class="mt-2">Korisnik</p>
<input class="form-control mb-2" placeholder="Ime">
<input type="password" class="form-control mb-2" placeholder="Password">
<button class="btn btn-danger w-100">Sačuvaj</button>
</div>
</div>
</div>

</div>
</div>
</div>

<script>
let alarms = JSON.parse(localStorage.getItem("alarms")) || [];
let therapies = JSON.parse(localStorage.getItem("therapies")) || [];

/* NAV */
function showPage(p){
  for(let i=1;i<=5;i++){
    document.getElementById("page"+i).style.display="none";
  }
  document.getElementById("page"+p).style.display="block";
}

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
}

/* CLOCK */
setInterval(()=>{
  let d=new Date();
  clock.innerText=d.toLocaleTimeString();
  date.innerText=d.toLocaleDateString();
},1000);

/* MINI CAL */
for(let i=1;i<=7;i++){
  let d=document.createElement("div");
  d.className="calendar-day";
  d.innerText=i;
  d.onclick=()=>d.classList.toggle("active");
  mini-cal.appendChild(d);
}

/* MONTH */
for(let i=1;i<=30;i++){
  let d=document.createElement("div");
  d.className="calendar-day";
  d.innerText=i;
  d.onclick=()=>d.classList.toggle("active");
  month.appendChild(d);
}

/* RENDER */
function render(){
  localStorage.setItem("alarms",JSON.stringify(alarms));
  localStorage.setItem("therapies",JSON.stringify(therapies));

  let aHTML="";
  alarms.forEach((a,i)=>{
    aHTML+=`
    <div class="d-flex justify-content-between align-items-center mb-2 border p-2 rounded">
      <div>
        <strong>${a.name}</strong><br>
        <small>${a.time}</small>
      </div>
      <div>
        <button class="btn btn-sm ${a.active?'btn-success':'btn-secondary'}" onclick="toggleAlarm(${i})">
          ${a.active?'ON':'OFF'}
        </button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteAlarm(${i})">Delete</button>
      </div>
    </div>`;
  });

  alarms.innerHTML=aHTML;
  alarms2.innerHTML=aHTML;

  let tHTML="";
  therapies.forEach((t,i)=>{
    tHTML+=`
    <div class="d-flex justify-content-between align-items-center mb-2 border p-2 rounded">
      <span>${t.name}</span>
      <div>
        <button class="btn btn-sm ${t.active?'btn-success':'btn-secondary'}" onclick="toggleTherapy(${i})">
          ${t.active?'Aktivno':'Pauza'}
        </button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteTherapy(${i})">Delete</button>
      </div>
    </div>`;
  });

  therapy.innerHTML=tHTML;
}

/* ALARM */
function addAlarm(){
  alarms.push({
    name: name.value,
    time: time.value,
    active: active.value==="true"
  });
  render();
}

function toggleAlarm(i){
  alarms[i].active=!alarms[i].active;
  render();
}

function deleteAlarm(i){
  alarms.splice(i,1);
  render();
}

/* THERAPY */
function addTherapy(){
  therapies.push({name:"Nova terapija",active:true});
  render();
}

function toggleTherapy(i){
  therapies[i].active=!therapies[i].active;
  render();
}

function deleteTherapy(i){
  therapies.splice(i,1);
  render();
}

/* INIT */
render();
</script>

</body>
</html>
