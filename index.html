<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background:#f3f3f3;
  font-family: 'Segoe UI';
}

/* SIDEBAR */
.sidebar {
  background:#8B1E1E;
  min-height:100vh;
  padding:15px;
}

.sidebar a {
  display:block;
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  text-decoration:none;
  color:black;
}

.sidebar a.active {
  background:#ddd;
}

/* HEADER */
.navbar {
  background:#d32f2f !important;
}

/* CARDS */
.card {
  border:none;
  border-radius:12px;
}

/* BUTTON */
.btn-danger {
  background:#8B1E1E;
  border:none;
}

/* CALENDAR */
.calendar-day {
  width:35px;
  height:35px;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:3px;
}

.calendar-day.active {
  background:#8B1E1E;
  color:white;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar {
    position:fixed;
    left:-100%;
    width:200px;
    z-index:1000;
    transition:0.3s;
  }

  .sidebar.show {
    left:0;
  }
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar" id="sidebar">
<a class="active" onclick="showPage(1)">Home</a>
<a onclick="showPage(2)">Alarmi</a>
<a onclick="showPage(3)">Terapija</a>
<a onclick="showPage(4)">Kalendar</a>
<a onclick="showPage(5)">Profil</a>
</div>

<!-- MAIN -->
<div class="col-md-10">

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-3 mb-3">
<button class="btn btn-light d-md-none" onclick="toggleSidebar()">☰</button>

<span class="text-white fw-bold">Pro Dashboard v3</span>

<div class="ms-auto d-flex gap-2">
<input class="form-control form-control-sm" placeholder="Search">
<button class="btn btn-light btn-sm">Profil</button>
<button class="btn btn-dark btn-sm">Register</button>
</div>
</nav>

<!-- HOME -->
<div id="page1">

<div class="row">

<div class="col-md-4">
<div class="card p-3 text-center shadow-sm">
<h6>Trenutno vreme</h6>
<h3 id="clock"></h3>
<small id="date"></small>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 shadow-sm text-center">
<h6>Kalendar aktivnosti</h6>
<div class="d-flex flex-wrap justify-content-center" id="mini-cal"></div>
<small>crveno = aktivno</small>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 shadow-sm">
<h6>Dodaj Alarm</h6>

<input class="form-control mb-2" id="name" placeholder="Naziv">
<input type="time" class="form-control mb-2" id="time">

<select class="form-control mb-2" id="active">
<option value="true">Aktivan</option>
<option value="false">Neaktivan</option>
</select>

<textarea class="form-control mb-2" placeholder="Napomena"></textarea>

<button class="btn btn-danger w-100" onclick="addAlarm()">Sačuvaj</button>
</div>
</div>

</div>

<div class="row mt-3">

<div class="col-md-6">
<div class="card p-3 shadow-sm">
<h6>Dnevni alarmi</h6>
<div id="alarms"></div>
</div>
</div>

<div class="col-md-6">
<div class="card p-3 shadow-sm">
<h6>Statistika</h6>
<div style="height:150px;background:#eee;border-radius:10px;"></div>
</div>
</div>

</div>

</div>

<!-- ALARMI -->
<div id="page2" style="display:none;">
<div class="card p-3 shadow-sm">
<h6>Lista alarma</h6>
<div id="alarms2"></div>
</div>
</div>

<!-- TERAPIJA -->
<div id="page3" style="display:none;">
<div class="card p-3 shadow-sm">
<h6>Lista terapija</h6>
<div id="therapy"></div>
<button class="btn btn-danger mt-2" onclick="addTherapy()">+ Dodaj</button>
</div>
</div>

<!-- KALENDAR -->
<div id="page4" style="display:none;">
<div class="card p-3 shadow-sm">
<h6>Mesečni kalendar</h6>
<div class="d-grid" style="grid-template-columns:repeat(7,1fr)" id="month"></div>
</div>
</div>

<!-- PROFIL -->
<div id="page5" style="display:none;">
<div class="card p-3 shadow-sm" style="max-width:400px;">
<h6>Profil</h6>
<div class="text-center">
<div style="width:80px;height:80px;background:#ccc;border-radius:50%;margin:auto"></div>
<p>Ime korisnika</p>
<input class="form-control mb-2" placeholder="Ime">
<input type="password" class="form-control mb-2" placeholder="Password">
<button class="btn btn-danger w-100">Sačuvaj</button>
</div>
</div>
</div>

</div>
</div>
</div>

<script>
let alarms = [];
let therapy = [];

/* NAV */
function showPage(p){
  for(let i=1;i<=5;i++){
    document.getElementById("page"+i).style.display = "none";
  }
  document.getElementById("page"+p).style.display = "block";
}

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
}

/* CLOCK */
setInterval(()=>{
  let d = new Date();
  document.getElementById("clock").innerText = d.toLocaleTimeString();
  document.getElementById("date").innerText = d.toLocaleDateString();
},1000);

/* MINI CAL */
for(let i=1;i<=7;i++){
  let d = document.createElement("div");
  d.className="calendar-day";
  d.innerText=i;
  d.onclick=()=>d.classList.toggle("active");
  document.getElementById("mini-cal").appendChild(d);
}

/* MONTH */
for(let i=1;i<=30;i++){
  let d = document.createElement("div");
  d.className="calendar-day";
  d.innerText=i;
  d.onclick=()=>d.classList.toggle("active");
  document.getElementById("month").appendChild(d);
}

/* ALARM */
function addAlarm(){
  let name=document.getElementById("name").value;
  let time=document.getElementById("time").value;
  let active=document.getElementById("active").value==="true";

  alarms.push({name,time,active});
  render();
}

function render(){
  let html="";
  alarms.forEach((a,i)=>{
    html+=`
    <div class="d-flex justify-content-between mb-2 border p-2 rounded">
      <div>${a.name} (${a.time})</div>
      <div>
        <button class="btn btn-sm ${a.active?'btn-success':'btn-secondary'}"
        onclick="toggle(${i})">${a.active?'Active':'Off'}</button>
        <button class="btn btn-sm btn-outline-danger" onclick="del(${i})">Delete</button>
      </div>
    </div>`;
  });
  document.getElementById("alarms").innerHTML=html;
  document.getElementById("alarms2").innerHTML=html;
}

function toggle(i){
  alarms[i].active=!alarms[i].active;
  render();
}

function del(i){
  alarms.splice(i,1);
  render();
}

/* THERAPY */
function addTherapy(){
  therapy.push("Nova terapija");
  let html="";
  therapy.forEach(t=>{
    html+=`<div class="border p-2 mb-2 rounded">${t}</div>`;
  });
  document.getElementById("therapy").innerHTML=html;
}
</script>

</body>
</html>
