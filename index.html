<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Health Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f5f6f8; }

.sidebar {
    background:#8B1E1E;
    min-height:100vh;
}

.sidebar a {
    display:block;
    background:white;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    text-decoration:none;
    color:black;
    text-align:center;
    transition:0.3s;
}

.sidebar a:hover { background:#ddd; }

.sidebar a.active {
    background:#E5E5E5;
    font-weight:bold;
}

.card {
    border-radius:15px;
}

.calendar-day {
    width:30px;
    height:30px;
    border-radius:50%;
    background:#ddd;
    margin:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
}

.calendar-day.active {
    background:#8B1E1E;
    color:white;
}

</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- DESKTOP SIDEBAR -->
<nav class="col-md-2 d-none d-md-block sidebar p-3">
<a class="active" data-target="desktop-1"><i class="bi bi-house"></i> Home</a>
<a data-target="desktop-2"><i class="bi bi-bell"></i> Alarmi</a>
<a data-target="desktop-3"><i class="bi bi-capsule"></i> Terapija</a>
<a data-target="desktop-4"><i class="bi bi-calendar"></i> Kalendar</a>
<a data-target="desktop-5"><i class="bi bi-person"></i> Profil</a>
</nav>

<main class="col-12 col-md-10">

<!-- NAVBAR -->
<nav class="navbar bg-danger px-3 mb-3">

<button class="btn btn-light d-md-none" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
<i class="bi bi-list"></i>
</button>

<span class="text-white fw-bold">DASHBOARD</span>

<div class="ms-auto d-flex gap-2">
<input type="text" class="form-control form-control-sm" placeholder="Search" id="search-input">
<button class="btn btn-light btn-sm" id="profile-btn"><i class="bi bi-person"></i></button>
</div>

</nav>

<!-- MOBILE SIDEBAR -->
<div class="offcanvas offcanvas-start" id="mobileSidebar">
<div class="offcanvas-body">

<a data-target="desktop-1">Home</a>
<a data-target="desktop-2">Alarmi</a>
<a data-target="desktop-3">Terapija</a>
<a data-target="desktop-4">Kalendar</a>
<a data-target="desktop-5">Profil</a>

</div>
</div>

<div id="main-content">

<!-- DASHBOARD -->
<div id="desktop-1">

<div class="row g-3 mb-3">

<div class="col-12 col-md-4">
<div class="card p-3 text-center">
<h6>Sledeći obrok</h6>
<h4 id="clock"></h4>
</div>
</div>

<div class="col-12 col-md-4">
<div class="card p-3 text-center">
<h6>Kalendar</h6>
<div class="d-flex flex-wrap justify-content-center" id="calendar-days"></div>
</div>
</div>

<div class="col-12 col-md-4">
<div class="card p-3">
<h6>Dodaj alarm</h6>
<form id="add-alarm-form">
<input type="text" class="form-control mb-2" placeholder="Naziv" required>
<input type="time" class="form-control mb-2" required>
<textarea class="form-control mb-2" placeholder="Napomena"></textarea>
<button class="btn btn-danger w-100">Sačuvaj</button>
</form>
</div>
</div>

</div>

<div class="row g-3">

<div class="col-12 col-md-6">
<div class="card p-3">
<h6>Dnevni alarmi</h6>
<ul class="list-group" id="alarms-list"></ul>
</div>
</div>

<div class="col-12 col-md-6">
<div class="card p-3">
<h6>Statistika</h6>
<canvas id="activityChart"></canvas>
</div>
</div>

</div>

</div>

<!-- ALARMI -->
<div id="desktop-2" style="display:none;">
<div class="card p-3">
<h6>Lista alarma</h6>
<ul class="list-group" id="alarms-list-2"></ul>
</div>
</div>

<!-- TERAPIJA -->
<div id="desktop-3" style="display:none;">
<div class="card p-3">
<h6>Terapije</h6>
<ul class="list-group" id="therapy-list"></ul>
<button class="btn btn-danger mt-2" id="add-therapy-btn">+ Dodaj</button>
</div>
</div>

<!-- KALENDAR -->
<div id="desktop-4" style="display:none;">
<div class="card p-3">
<h6>Mesečni pregled</h6>
<div id="month-calendar" class="d-grid" style="grid-template-columns:repeat(7,1fr)"></div>
</div>
</div>

<!-- PROFIL -->
<div id="desktop-5" style="display:none;">
<div class="card p-3 text-center" style="max-width:400px;">
<div class="rounded-circle bg-secondary mx-auto mb-2" style="width:80px;height:80px;"></div>
<h6 id="profile-name">Marko</h6>
<button class="btn btn-danger mt-2">Izloguj se</button>
</div>
</div>

</div>
</main>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<script>

let alarms=[];
let therapies=[];

const sidebarLinks=document.querySelectorAll('[data-target]');
const desktops=document.querySelectorAll('#main-content > div');

sidebarLinks.forEach(link=>{
link.addEventListener('click',()=>{
desktops.forEach(d=>d.style.display='none');
document.getElementById(link.dataset.target).style.display='block';
});
});

function updateClock(){
document.getElementById('clock').textContent=new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);

for(let i=1;i<=14;i++){
const d=document.createElement('div');
d.className='calendar-day'+(i%3===0?' active':'');
d.textContent=i;
document.getElementById('calendar-days').appendChild(d);
}

const month=document.getElementById('month-calendar');
for(let i=1;i<=30;i++){
const d=document.createElement('div');
d.className='calendar-day'+(i%5===0?' active':'');
d.textContent=i;
month.appendChild(d);
}

const alarmsList=document.getElementById('alarms-list');
const alarmsList2=document.getElementById('alarms-list-2');

function renderAlarms(){
alarmsList.innerHTML='';
alarmsList2.innerHTML='';

alarms.forEach((a,i)=>{
const li=document.createElement('li');
li.className='list-group-item d-flex justify-content-between';
li.innerHTML=`${a.name} (${a.time})`;

const btn=document.createElement('button');
btn.className='btn btn-sm btn-danger';
btn.innerText='X';
btn.onclick=()=>{alarms.splice(i,1);renderAlarms();};

li.appendChild(btn);

alarmsList.appendChild(li);
alarmsList2.appendChild(li.cloneNode(true));
});
}

document.getElementById('add-alarm-form').addEventListener('submit',e=>{
e.preventDefault();
const f=e.target;
alarms.push({name:f[0].value,time:f[1].value});
renderAlarms();
f.reset();
});

const therapyList=document.getElementById('therapy-list');

function renderTherapies(){
therapyList.innerHTML='';
therapies.forEach((t,i)=>{
const li=document.createElement('li');
li.className='list-group-item d-flex justify-content-between';
li.innerHTML=t.name;

const btn=document.createElement('button');
btn.className='btn btn-sm btn-danger';
btn.innerText='X';
btn.onclick=()=>{therapies.splice(i,1);renderTherapies();};

li.appendChild(btn);
therapyList.appendChild(li);
});
}

document.getElementById('add-therapy-btn').onclick=()=>{
therapies.push({name:'Nova terapija'});
renderTherapies();
};

const ctx=document.getElementById('activityChart');
new Chart(ctx,{
type:'bar',
data:{
labels:['Alarmi','Terapije'],
datasets:[{data:[alarms.length,therapies.length],backgroundColor:['#8B1E1E','#d9534f']}]
}
});

</script>

</body>
</html>
