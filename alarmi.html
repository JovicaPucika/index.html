<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarmi - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-header">
        <span style="font-weight:700; letter-spacing:2px;">HEADER</span>
        <div class="d-flex gap-2 align-items-center">
            <div style="background:#f0f0f0; border-radius:6px; padding:3px 10px;">
                🔍 <input style="border:none; background:none; outline:none; width:80px; font-size:12px;" placeholder="Search">
            </div>
            <span style="background:#8B1E1E; color:white; padding:3px 12px; border-radius:20px; font-size:12px;">Korisnik</span>
        </div>
    </div>

    <div class="d-flex main-wrapper">
        <div class="sidebar">
            <div class="text-white text-center py-3 fw-bold">SIDEBAR</div>
            <a href="index.html" class="nav-item">Home</a>
            <a href="alarmi.html" class="nav-item active">Alarmi</a>
        </div>

        <div class="flex-grow-1">
            <div style="background:#8B1E1E; color:white; padding:9px 15px; font-weight:700;">DASHBOARD - SVI ALARMI</div>
            <div class="p-4">
                <div class="card p-4">
                    <h6 class="mb-3">Lista tvojih alarma</h6>
                    <div class="alarm-row"><span>Doručak (08:00)</span> <span class="pill-on">ON</span></div>
                    <div class="alarm-row"><span>Ručak (14:30)</span> <span class="pill-off">OFF</span></div>
                    <div class="alarm-row"><span>Večera (19:00)</span> <span class="pill-on">ON</span></div>
                    <button class="btn-red mt-3" onclick="location.href='index.html'">+ Dodaj novi alarm</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
